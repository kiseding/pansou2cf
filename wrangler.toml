name = "pansou2cf"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./pansou-web/dist"

[[kv_namespaces]]
binding = "PLUGIN_KV"
id = "PLUGIN_KV_ID_PLACEHOLDER"

[vars]
AUTH_ENABLED = "false"
AUTH_USERS = ""
AUTH_JWT_SECRET = ""
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "PLACEHOLDER_ADMIN_PASSWORD"
REGISTER_CODE = "PLACEHOLDER_REGISTER_CODE"
CHANNELS = ""
ASYNC_PLUGIN_ENABLED = "true"
ENABLED_PLUGINS = ""
ASYNC_RESPONSE_TIMEOUT = "4"
PLUGIN_TIMEOUT = "8"
# Plugin encryption keys (change in production via GitHub Secrets)
PANLIAN_ENCRYPTION_KEY = "default-panlian-encryption-key!!"
GYING_ENCRYPTION_KEY = "gying-secret-key-32bytes-long!!!"
QQPD_ENCRYPTION_KEY = "default-32-byte-key-change-me!"
WEIBO_ENCRYPTION_KEY = "default-32-byte-key-change-me!"
PANLIAN_HASH_SALT = "pansou_panlian_secret_2026"
GYING_HASH_SALT = "pansou_gying_secret_2025"
QQPD_HASH_SALT = "pansou_qqpd_secret_2025"
WEIBO_HASH_SALT = "pansou_weibo_secret_2025"
